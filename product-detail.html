<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details — Mansi</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
  <style>
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding: 60px 5%; }
    .detail-img-container { background: var(--bg-soft); aspect-ratio: 3/4; overflow: hidden; }
    .detail-img-container img { width: 100%; height: 100%; object-fit: cover; }
    .detail-info { padding-top: 20px; }
    .detail-category { text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem; color: var(--text-light); margin-bottom: 12px; }
    .detail-title { font-family: var(--font-serif); font-size: 3rem; margin-bottom: 24px; line-height: 1.1; }
    .detail-price { font-size: 1.5rem; font-weight: 600; margin-bottom: 40px; }
    .detail-desc { color: var(--text-muted); margin-bottom: 40px; font-size: 0.95rem; line-height: 1.8; }
    @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; gap: 40px; } }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-logo" href="index.html">Mansi<span>.</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="products.html" class="nav-link">Collections</a>
      <a href="orders.html" class="nav-link">My Orders</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" style="font-size:0.8rem; font-weight:700;">CART (<span class="cart-count">0</span>)</a>
    </div>
  </nav>

  <!-- PRODUCT DETAIL -->
  <div class="detail-grid" id="product-detail">
    <!-- Dynamic Content -->
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderProduct();
      initNavbar();
    });

    function renderProduct() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      const p = DB.getProductById(id);
      if (!p) {
        document.getElementById('product-detail').innerHTML = "<h1>Product not found</h1>";
        return;
      }

      document.getElementById('product-detail').innerHTML = `
        <div class="detail-img-container">
          <img src="${p.image || 'https://via.placeholder.com/600x800'}" alt="${p.name}" />
        </div>
        <div class="detail-info">
          <div class="detail-category">${p.category}</div>
          <h1 class="detail-title">${p.name}</h1>
          <div class="detail-price">₹${p.price}</div>
          <p class="detail-desc">${p.description || 'A timeless piece crafted with precision and elegance, designed to elevate your sophisticated style.'}</p>
          
          <div style="display: flex; gap: 16px;">
            <button class="btn btn-primary" onclick="Cart.add('${p.id}')">Add to Bag</button>
            <button class="btn btn-outline" onclick="window.open('https://wa.me/${STORE.whatsapp}?text=I am interested in ${p.name}', '_blank')">Inquire via WhatsApp</button>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
