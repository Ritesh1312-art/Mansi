<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections — Mansi Jewellery & Cosmetics</title>
  <meta name="description" content="Browse all Mansi Jewellery & Cosmetics collections. Premium jewellery, cosmetics and gift items."/>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-logo" href="index.html">
      <div class="nav-logo-icon">💍</div>
      <div class="nav-logo-text"><span>Mansi</span> Jewellery</div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="products.html" class="nav-link" style="color:var(--accent);">Collections</a>
    </div>
    <div class="nav-right">
      <a href="cart.html" class="cart-btn">🛒 Cart <span class="cart-count" style="display:none;">0</span></a>
      <div id="user-area" style="display:flex;gap:8px;align-items:center;"></div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <header style="padding: 80px 5% 40px; text-align: center;">
    <h1 style="font-size: 3.5rem;">The Collections</h1>
    <p style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem; color: var(--text-light); margin-top: 12px;">Elegance in every detail</p>
  </header>

  <!-- CATEGORY FILTER -->
  <div style="max-width: 1200px; margin: 0 auto; padding: 0 5% 20px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
    <!-- Dynamic category chips -->
    <div id="category-filters" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;"></div>
  </div>

  <!-- PRODUCTS GRID -->
  <div class="products-grid" id="all-products">
    <!-- Dynamic Content -->
  </div>

  <!-- FOOTER (rendered by JS) -->
  <footer class="footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCategoryFilters();
      renderProducts('all');
      initNavbar();
    });

    function renderCategoryFilters() {
      const container = document.getElementById('category-filters');
      container.innerHTML = CATEGORIES.map(c =>
        `<button onclick="filterProducts('${c.id}')" class="cat-btn ${c.id === 'all' ? 'active' : ''}" 
          style="padding:8px 20px;border:1.5px solid var(--border);background:transparent;color:var(--text);border-radius:30px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;">
          ${c.icon} ${c.name}
        </button>`
      ).join('');
    }

    function filterProducts(catId) {
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.remove('active');
        btn.style.background = 'transparent';
        btn.style.borderColor = 'var(--border)';
        btn.style.color = 'var(--text)';
      });
      const activeBtn = event.target.closest('.cat-btn');
      if (activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.style.background = 'var(--primary)';
        activeBtn.style.borderColor = 'var(--primary)';
        activeBtn.style.color = 'var(--white)';
      }
      renderProducts(catId);
    }

    function renderProducts(category = 'all') {
      const products = DB.getProducts();
      const filtered = category === 'all' ? products : products.filter(p => p.category === category);
      const container = document.getElementById('all-products');
      
      if (!filtered.length) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:60px;grid-column:1/-1;">No products in this category yet.</p>';
        return;
      }
      container.innerHTML = filtered.map(p => `
        <div class="product-card" onclick="location.href='product-detail.html?id=${p.id}'">
          <div class="product-card-img">
            <img src="${p.image || 'https://via.placeholder.com/600x800'}" alt="${p.name}" />
          </div>
          <div class="product-card-info">
            <div class="product-card-category">${p.category}</div>
            <h3 class="product-card-title">${p.name}</h3>
            <div class="product-card-price">₹${p.price}</div>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
