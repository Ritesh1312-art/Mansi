<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collections — Mansi</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-logo" href="index.html">Mansi<span>.</span></a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="products.html" class="nav-link" style="color:var(--accent);">Collections</a>
      <a href="orders.html" class="nav-link">My Orders</a>
    </div>
    <div class="nav-actions">
      <a href="cart.html" style="font-size:0.8rem; font-weight:700;">CART (<span class="cart-count">0</span>)</a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <header style="padding: 80px 5% 40px; text-align: center;">
    <h1 style="font-size: 3.5rem; margin-bottom: 12px;">The Collections</h1>
    <p style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem; color: var(--text-light);">Elegance in every detail</p>
  </header>

  <!-- PRODUCTS GRID -->
  <div class="products-grid" id="all-products">
    <!-- Dynamic Content -->
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderProducts();
      initNavbar();
    });

    function renderProducts() {
      const products = DB.getProducts();
      const container = document.getElementById('all-products');
      container.innerHTML = products.map(p => `
        <div class="product-card" onclick="location.href='product-detail.html?id=${p.id}'">
          <div class="product-card-img">
            <img src="${p.image || 'https://via.placeholder.com/600x800'}" alt="${p.name}" />
          </div>
          <div class="product-card-info">
            <div class="product-card-category">${p.category}</div>
            <h3 class="product-card-title">${p.name}</h3>
            <div class="product-card-price">₹${p.price}</div>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
