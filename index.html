<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mansi — Minimalist Luxury Jewellery & Cosmetics</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-logo" href="index.html">Mansi<span>.</span></a>
    
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="products.html" class="nav-link">Collections</a>
      <a href="orders.html" class="nav-link">My Orders</a>
    </div>

    <div class="nav-actions">
      <select onchange="applyTheme(this.value)" style="border:none; background:none; text-transform:uppercase; font-size:0.7rem; letter-spacing:1px; cursor:pointer;">
        <option value="default">Light</option>
        <option value="dark">Dark</option>
      </select>
      <a href="cart.html" style="font-size:0.8rem; font-weight:700;">CART (<span class="cart-count">0</span>)</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <p>ESTABLISHED 2025</p>
      <h1>Timeless Elegance.</h1>
      <a href="products.html" class="btn btn-primary">Shop Collection</a>
    </div>
  </section>

  <!-- FEATURED COLLECTIONS -->
  <section style="padding: 100px 5%;">
    <div style="text-align: center; margin-bottom: 60px;">
      <h2 style="font-size: 3rem;">Our Collections</h2>
      <p style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem; color: var(--text-light);">Curated for your sophisticated taste</p>
    </div>
    
    <div class="products-grid" id="featured-products">
      <!-- Dynamic Products -->
    </div>
  </section>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderFeatured();
      initNavbar();
    });

    function renderFeatured() {
      const products = DB.getProducts().slice(0, 8);
      const container = document.getElementById('featured-products');
      container.innerHTML = products.map(p => `
        <div class="product-card" onclick="location.href='product-detail.html?id=${p.id}'">
          <div class="product-card-img">
            <img src="${p.image || 'https://via.placeholder.com/600x800'}" alt="${p.name}" />
          </div>
          <div class="product-card-info">
            <div class="product-card-category">${p.category}</div>
            <h3 class="product-card-title">${p.name}</h3>
            <div class="product-card-price">₹${p.price}</div>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
