<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mansi — Minimalist Luxury Jewellery & Cosmetics</title>
  <meta name="description" content="Mansi Jewellery & Cosmetics — Apna Local Market. Style Meets Tradition. Premium jewellery, cosmetics and gift items."/>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-logo" href="index.html">
      <div class="nav-logo-icon">💍</div>
      <div class="nav-logo-text"><span>Mansi</span> Jewellery</div>
    </a>
    
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="products.html" class="nav-link">Collections</a>
      <a href="orders.html" class="nav-link">My Orders</a>
    </div>

    <div class="nav-right">
      <a href="cart.html" class="cart-btn">🛒 Cart <span class="cart-count" style="display:none;">0</span></a>
      <div id="user-area" style="display:flex;gap:8px;align-items:center;"></div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <p>ESTABLISHED 2025</p>
      <h1>Timeless Elegance.</h1>
      <p>Jewellery & Cosmetics</p>
      <a href="products.html" class="btn btn-primary">Shop Collection</a>
    </div>
  </section>

  <!-- FEATURED COLLECTIONS -->
  <section style="padding: 100px 5%;">
    <div style="text-align: center; margin-bottom: 60px;">
      <h2 style="font-size: 3rem;">Our Collections</h2>
      <p style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem; color: var(--text-light);">Curated for your sophisticated taste</p>
    </div>
    
    <div class="products-grid" id="featured-products">
      <!-- Dynamic Products -->
    </div>
  </section>

  <!-- CONTACT US / WHATSAPP FORM SECTION -->
  <section style="padding: 80px 5%; background: var(--bg-soft);">
    <div style="text-align: center; margin-bottom: 50px;">
      <h2 style="font-size: 2.5rem; font-family: var(--font-serif);">Contact Us</h2>
      <p style="text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem; color: var(--text-light); margin-top: 10px;">Send us a message on WhatsApp</p>
    </div>
    
    <div style="max-width: 500px; margin: 0 auto; background: var(--bg); padding: 40px; border: 1px solid var(--border); border-radius: 16px;">
      <div style="margin-bottom: 20px;">
        <label style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600;">Your Name</label>
        <input id="contact-name" type="text" placeholder="Enter your name" style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-family: var(--font-sans); font-size: 0.9rem; outline: none; border-radius: 8px;" />
      </div>
      <div style="margin-bottom: 20px;">
        <label style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600;">Your Message</label>
        <textarea id="contact-message" rows="5" placeholder="How can we help you? (product inquiry, custom order, etc.)" style="width: 100%; padding: 12px 16px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-family: var(--font-sans); font-size: 0.9rem; resize: vertical; outline: none; border-radius: 8px;"></textarea>
      </div>
      <button onclick="sendWhatsAppMessage()" style="width: 100%; padding: 14px; background: #25D366; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.2s;">
        💬 Send via WhatsApp
      </button>
      <p id="contact-success" style="display:none; text-align:center; margin-top:16px; color: #059669; font-weight:600; font-size:0.9rem;">Message sent! We'll get back to you soon. ✓</p>
    </div>
  </section>

  <!-- FOOTER (rendered by JS) -->
  <footer class="footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderFeatured();
      initNavbar();
    });

    function renderFeatured() {
      const products = DB.getProducts().slice(0, 8);
      const container = document.getElementById('featured-products');
      if (!products.length) {
        container.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">No products available yet. Check back soon!</p>';
        return;
      }
      container.innerHTML = products.map(p => `
        <div class="product-card" onclick="location.href='product-detail.html?id=${p.id}'">
          <div class="product-card-img">
            <img src="${p.image || 'https://via.placeholder.com/600x800'}" alt="${p.name}" />
          </div>
          <div class="product-card-info">
            <div class="product-card-category">${p.category}</div>
            <h3 class="product-card-title">${p.name}</h3>
            <div class="product-card-price">₹${p.price}</div>
          </div>
        </div>
      `).join('');
    }

    function sendWhatsAppMessage() {
      const name = document.getElementById('contact-name').value.trim();
      const message = document.getElementById('contact-message').value.trim();
      if (!name || !message) {
        alert('Please enter your name and message.');
        return;
      }
      const text = `Hi Mansi Jewellery! 👋\n\nName: ${name}\n\nMessage: ${message}`;
      const url = `https://wa.me/${STORE.whatsapp}?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
      document.getElementById('contact-success').style.display = 'block';
      document.getElementById('contact-name').value = '';
      document.getElementById('contact-message').value = '';
    }
  </script>
</body>
</html>
