<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Orders — Mansi Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .admin-auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 99999; }
    .admin-auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 400px; box-shadow: var(--shadow); text-align: center; }
    .admin-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .admin-sidebar { background: var(--primary); color: var(--white); padding: 40px 24px; }
    .admin-sidebar h2 { font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 48px; letter-spacing: 2px; }
    .admin-nav-item { display: block; padding: 16px 0; color: rgba(255,255,255,0.6); text-transform: uppercase; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.05); text-decoration: none; }
    .admin-nav-item.active { color: var(--accent); }
    .admin-nav-item:hover { color: var(--white); }
    .admin-main { padding: 60px 5%; background: var(--bg-soft); }
    .admin-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
    .admin-table th { text-align: left; padding: 12px 10px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); border-bottom: 2px solid var(--border); }
    .admin-table td { padding: 14px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
    .badge-warning { background: #FEF3C7; color: #92400E; }
    .badge-info { background: #DBEAFE; color: #1E40AF; }
    .badge-success { background: #D1FAE5; color: #065F46; }
  </style>
</head>
<body>

  <!-- ADMIN AUTH OVERLAY -->
  <div id="admin-auth" class="admin-auth-overlay">
    <div class="admin-auth-card">
      <div style="font-size: 3rem; margin-bottom: 12px;">🔐</div>
      <h2 style="margin-bottom: 8px;">Admin Login</h2>
      <p style="color: var(--text-muted); font-size: 0.88rem; margin-bottom: 24px;">Enter password to access the panel</p>
      <div class="form-group" style="text-align: left;">
        <label class="form-label">Password</label>
        <input type="password" id="admin-pass-input" class="form-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') verifyAdminPassword()"/>
      </div>
      <button class="btn-full" onclick="verifyAdminPassword()" style="margin-top: 12px;">Login as Admin</button>
      <p id="admin-auth-err" style="color: var(--error); font-size: 0.85rem; margin-top: 12px; display: none;">❌ Incorrect password!</p>
    </div>
  </div>

  <div id="admin-content" style="display: none;">
    <!-- AD 1 -->
    <div style="width:100%;background:#000;display:flex;justify-content:center;align-items:center;padding:6px 0;overflow:hidden;">
      <a href="https://hilltopads.com/?ref=392928" target="_blank" rel="noopener">
        <img src="//static.hilltopads.com/other/banners/pub/huge_income/728x90.gif?v=1783682851" alt="Advertisement" style="max-width:100%;height:auto;display:block;"/>
      </a>
    </div>

    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div style="font-size: 1.5rem; font-weight: 900; color: var(--primary); margin-bottom: 40px;">
          <span>⚙️</span> Mansi Admin
        </div>
        <nav>
          <a href="index.html" class="admin-nav-item">📊 Dashboard</a>
          <a href="products.html" class="admin-nav-item">🛍️ Products</a>
          <a href="orders.html" class="admin-nav-item active">📦 Orders</a>
          <a href="settings.html" class="admin-nav-item">⚙️ Settings</a>
          <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);">
            <a href="../index.html" class="admin-nav-item">🏠 View Store</a>
            <a href="#" onclick="logoutAdmin()" class="admin-nav-item" style="color: var(--error);">🚪 Logout</a>
          </div>
        </nav>
      </aside>

      <main class="admin-main">
        <div class="admin-header">
          <div>
            <h1>📦 Manage Orders</h1>
            <p style="color: var(--text-muted); font-size: 0.88rem; margin-top: 4px;">View, track, and update customer orders</p>
          </div>
          <select id="status-filter" onchange="renderOrdersTable()" style="padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-sans); font-size: 0.85rem;">
            <option value="all">All Orders</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
          </select>
        </div>

        <!-- AD 2 -->
        <div style="width:100%;background:#111;display:flex;justify-content:center;align-items:center;padding:10px 0;margin:20px 0;overflow:hidden;border-radius:10px;">
          <a href="https://hilltopads.com/?ref=392928" target="_blank" rel="noopener">
            <img src="//static.hilltopads.com/other/banners/pub/get_high_ecpm/728x90.gif?v=1783682851" alt="Advertisement" style="max-width:100%;height:auto;display:block;"/>
          </a>
        </div>

        <table class="admin-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Items</th>
              <th>Amount</th>
              <th>Delivery</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="admin-orders-list">
          </tbody>
        </table>

        <!-- AD 3 -->
        <div style="width:100%;background:#000;display:flex;justify-content:center;align-items:center;padding:10px 0;margin-top:20px;overflow:hidden;">
          <a href="https://hilltopads.com/?ref=392928" target="_blank" rel="noopener">
            <img src="//static.hilltopads.com/other/banners/pub/make_big_money/728x90.gif?v=1783682851" alt="Advertisement" style="max-width:100%;height:auto;display:block;"/>
          </a>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    loadTheme();

    // ===== ADMIN AUTH — Uses saved password from settings =====
    function getAdminPassword() {
      const settings = JSON.parse(localStorage.getItem("storeSettings") || "{}");
      return settings.adminPassword || "";
    }

    function checkAdminAuth() {
      if (localStorage.getItem("adminAuth") === "true") {
        document.getElementById("admin-auth").style.display = "none";
        document.getElementById("admin-content").style.display = "block";
        renderOrdersTable();
      }
    }

    function verifyAdminPassword() {
      const typed = document.getElementById("admin-pass-input").value;
      const err = document.getElementById("admin-auth-err");
      
      if (!typed) {
        err.textContent = "❌ Please enter a password!";
        err.style.display = "block";
        return;
      }

      const savedPass = getAdminPassword();
      const correctPass = savedPass || "mansi@admin123";
      
      if (btoa(typed) === btoa(correctPass)) {
        localStorage.setItem("adminAuth", "true");
        document.getElementById("admin-auth").style.display = "none";
        document.getElementById("admin-content").style.display = "block";
        err.style.display = "none";
        renderOrdersTable();
      } else {
        err.textContent = "❌ Incorrect password!";
        err.style.display = "block";
      }
    }

    function logoutAdmin() {
      localStorage.removeItem("adminAuth");
      location.reload();
    }

    function renderOrdersTable() {
      const filter = document.getElementById("status-filter").value;
      const orders = DB.getOrders();
      const list = document.getElementById("admin-orders-list");

      const filtered = filter === "all" ? orders : orders.filter(o => o.status === filter);

      if (filtered.length === 0) {
        list.innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--text-muted);padding:20px;">No orders found.</td></tr>`;
        return;
      }

      list.innerHTML = filtered.map(o => {
        let badgeClass = "badge-warning";
        if (o.status === "confirmed") badgeClass = "badge-info";
        if (o.status === "shipped") badgeClass = "badge-warning";
        if (o.status === "delivered") badgeClass = "badge-success";

        const itemsCount = o.items.reduce((sum, item) => sum + item.qty, 0);
        const itemsList = o.items.map(item => `${item.name} (x${item.qty})`).join(", ");

        const statusMsg = encodeURIComponent(
          `Hello ${o.customerName},\nYour Order #${o.id} at Mansi Jewellery & Cosmetics has been marked as *${o.status.toUpperCase()}*.\nTotal Order Amount: ₹${o.grandTotal}\nThank you for shopping with us!`
        );

        return `
          <tr>
            <td><strong>${o.id}</strong></td>
            <td>
              <div style="font-weight:700;">${o.customerName}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${o.address?.house || ''}, ${o.address?.street || ''}, ${o.address?.city || ''}, ${o.address?.state || ''} - ${o.address?.pincode || ''}">
                📍 ${o.address?.city || 'N/A'}, ${o.address?.pincode || 'N/A'}
              </div>
            </td>
            <td>
              <a href="https://wa.me/${o.phone}" target="_blank" style="color:var(--primary);font-weight:600;">💬 Message</a>
            </td>
            <td>
              <span title="${itemsList}" style="cursor:help;border-bottom:1px dashed var(--text-light);">${itemsCount} Item(s)</span>
            </td>
            <td style="color:var(--primary);font-weight:700;">₹${o.grandTotal}</td>
            <td style="color:var(--text-muted);">₹${o.deliveryCharge}</td>
            <td style="font-size:0.75rem;padding:3px 6px;background:var(--bg-input);border-radius:4px;font-weight:700;display:inline-block;">${(o.paymentMode || 'cod').toUpperCase()}</td>
            <td><span class="badge ${badgeClass}">${(o.status || 'pending').toUpperCase()}</span></td>
            <td style="font-size:0.78rem;color:var(--text-muted);">${o.createdAt ? new Date(o.createdAt).toLocaleDateString() : 'N/A'}</td>
            <td>
              <div style="display:flex;gap:6px;align-items:center;">
                <select onchange="updateStatus('${o.id}', this.value)" style="padding:6px 10px;font-size:0.78rem;border:1px solid var(--border);border-radius:6px;">
                  <option value="pending" ${o.status === "pending" ? "selected" : ""}>Pending</option>
                  <option value="confirmed" ${o.status === "confirmed" ? "selected" : ""}>Confirmed</option>
                  <option value="shipped" ${o.status === "shipped" ? "selected" : ""}>Shipped</option>
                  <option value="delivered" ${o.status === "delivered" ? "selected" : ""}>Delivered</option>
                </select>
                <a href="https://wa.me/${o.phone}?text=${statusMsg}" target="_blank" style="padding:6px 10px;font-size:0.75rem;border:1px solid #25D366;color:#25D366;text-decoration:none;border-radius:6px;font-weight:600;white-space:nowrap;">
                  💬 Notify
                </a>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function updateStatus(orderId, newStatus) {
      DB.updateOrderStatus(orderId, newStatus);
      renderOrdersTable();
      Cart.showToast("Order status updated!");
    }

    checkAdminAuth();
  </script>
</body>
</html>
