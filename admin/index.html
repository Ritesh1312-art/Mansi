<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Mansi</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .admin-auth-overlay { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .admin-auth-card { width: 100%; max-width: 400px; text-align: center; padding: 40px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 48px; }
    .stat-item { background: #fff; padding: 32px; border: 1px solid var(--border); }
    .stat-label { text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; color: var(--text-light); margin-bottom: 8px; font-weight: 700; }
    .stat-value { font-family: var(--font-serif); font-size: 2rem; font-weight: 700; }
  </style>
</head>
<body onload="checkAdminAuth()">

  <!-- AUTH -->
  <div id="admin-auth" class="admin-auth-overlay">
    <div class="admin-auth-card">
      <h1 style="font-family: var(--font-serif); font-size: 2.5rem; margin-bottom: 8px;">Admin Login</h1>
      <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; color: var(--text-light); margin-bottom: 40px;">Secure Access Only</p>
      <input type="password" id="admin-pass-input" placeholder="PASSWORD" style="width: 100%; padding: 16px; border: 1px solid var(--border); margin-bottom: 24px; text-align: center; letter-spacing: 4px;"/>
      <button class="btn btn-primary btn-full" onclick="verifyAdminPassword()" style="width: 100%;">Enter Dashboard</button>
      <p id="admin-auth-err" style="color: #dc2626; font-size: 0.85rem; margin-top: 12px; display: none;">❌ Incorrect password!</p>
    </div>
  </div>

  <div id="admin-content" style="display: none;">
    <div class="admin-container">
      <aside class="admin-sidebar">
        <h2>Mansi<span>.</span></h2>
        <nav>
          <a href="index.html" class="admin-nav-item active">Dashboard</a>
          <a href="products.html" class="admin-nav-item">Products</a>
          <a href="orders.html" class="admin-nav-item">Orders</a>
          <a href="settings.html" class="admin-nav-item">Settings</a>
          <a href="../index.html" class="admin-nav-item" style="margin-top: 40px; color: var(--accent);">View Store</a>
          <a href="#" onclick="logoutAdmin()" class="admin-nav-item">Logout</a>
        </nav>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <div>
            <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; color: var(--text-light);">Overview</p>
            <h1 style="font-size: 2.5rem; font-family: var(--font-serif);">Dashboard</h1>
          </div>
          <div id="admin-date" style="font-size: 0.8rem; font-weight: 600;"></div>
        </header>

        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value" id="stat-revenue">₹0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Total Orders</div>
            <div class="stat-value" id="stat-orders">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Pending Orders</div>
            <div class="stat-value" id="stat-pending">0</div>
          </div>
        </div>

        <div class="admin-card">
          <h3 style="font-family: var(--font-serif); font-size: 1.5rem; margin-bottom: 24px;">Recent Activity</h3>
          <div id="recent-activity-list">
            <!-- Dynamic -->
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    function checkAdminAuth() {
      if (localStorage.getItem("adminAuth") === "true") {
        document.getElementById("admin-auth").style.display = "none";
        document.getElementById("admin-content").style.display = "grid";
        initDashboard();
      }
    }

    function getAdminPassword() {
      const settings = JSON.parse(localStorage.getItem("storeSettings") || "{}");
      return settings.adminPassword || "";
    }

    function verifyAdminPassword() {
      const typed = document.getElementById("admin-pass-input").value;
      const err = document.getElementById("admin-auth-err");

      if (!typed) {
        err.textContent = "❌ Please enter a password!";
        err.style.display = "block";
        return;
      }

      const savedPass = getAdminPassword();
      const correctPass = savedPass || "mansi@admin123";

      if (btoa(typed) === btoa(correctPass)) {
        localStorage.setItem("adminAuth", "true");
        document.getElementById("admin-auth").style.display = "none";
        document.getElementById("admin-content").style.display = "grid";
        initDashboard();
      } else {
        err.textContent = "❌ Incorrect password!";
        err.style.display = "block";
      }
    }

    function logoutAdmin() {
      localStorage.removeItem("adminAuth");
      location.reload();
    }

    function initDashboard() {
      document.getElementById("admin-date").textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const rev = DB.getRevenue();
      document.getElementById("stat-revenue").textContent = "₹" + rev.total;
      document.getElementById("stat-orders").textContent = rev.totalOrders;
      document.getElementById("stat-pending").textContent = rev.pendingOrders;
    }
  </script>
</body>
</html>
