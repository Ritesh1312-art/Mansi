<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Mansi Jewellery &amp; Cosmetics</title>
  <meta name="description" content="Create your Mansi Jewellery &amp; Cosmetics account to enjoy faster checkout, order tracking and exclusive offers." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-page-wrap { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px 16px 48px; }
    .auth-card {
      width: 100%; max-width: 480px;
      background: var(--bg-card); border-radius: 24px; padding: 40px;
      border: 1px solid var(--border); box-shadow: var(--shadow);
      animation: slideUp 0.4s ease;
    }
    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px; justify-content: center;
    }
    .auth-logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px; display: grid; place-items: center; font-size: 1.5rem;
    }
    .auth-logo-text { font-size: 1.1rem; font-weight: 800; color: var(--text); }
    .auth-logo-text span { color: var(--primary); }
    .auth-card h2 { font-size: 1.7rem; font-weight: 800; margin-bottom: 6px; text-align: center; }
    .auth-card > p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px; text-align: center; }
    .minimal-nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-nav); backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 9px; display: grid; place-items: center; font-size: 1.1rem;
    }
    .nav-logo-text { font-size: 1rem; font-weight: 700; color: var(--text); }
    .nav-logo-text span { color: var(--primary); }
    .error-msg {
      background: #FEE2E2; color: #991B1B; border-radius: 10px;
      padding: 10px 14px; font-size: 0.85rem; font-weight: 600;
      margin-bottom: 16px; display: none; border: 1px solid #FECACA;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .terms-check {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.83rem; color: var(--text-muted); margin: 16px 0;
    }
    .terms-check input { margin-top: 2px; accent-color: var(--primary); flex-shrink: 0; }
    .terms-check a { color: var(--primary); font-weight: 600; }
    .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--border); transition: all 0.3s; }
    .strength-bar .fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.3s, background 0.3s; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <!-- AD1-TOP -->
  <div style="width:100%;background:#000;display:flex;justify-content:center;align-items:center;padding:6px 0;overflow:hidden;">
    <a href="https://hilltopads.com/?ref=392928" target="_blank" rel="noopener">
      <img src="//static.hilltopads.com/other/banners/pub/huge_income/728x90.gif?v=1783682851" alt="Advertisement" style="max-width:100%;height:auto;display:block;"/>
    </a>
  </div>

  <!-- MINIMAL NAVBAR -->
  <nav class="minimal-nav">
    <a class="nav-logo" href="index.html">
      <div class="nav-logo-icon">💍</div>
      <div class="nav-logo-text"><span>Mansi</span> Jewellery</div>
    </a>
    <a href="login.html" class="nav-btn outline-btn" style="padding:8px 18px;border-radius:10px;font-size:0.85rem;font-weight:600;border:1.5px solid var(--border);background:transparent;color:var(--text);">Login</a>
  </nav>

  <div class="auth-page-wrap">
    <!-- AD2-MIDDLE -->
    <div style="width:100%;background:#111;display:flex;justify-content:center;align-items:center;padding:10px 0;margin:20px 0;overflow:hidden;">
      <a href="https://hilltopads.com/?ref=392928" target="_blank" rel="noopener">
        <img src="//static.hilltopads.com/other/banners/pub/get_high_ecpm/728x90.gif?v=1783682851" alt="Advertisement" style="max-width:100%;height:auto;display:block;"/>
      </a>
    </div>

    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="auth-logo-icon">✨</div>
          <div class="auth-logo-text"><span>Mansi</span> Jewellery &amp; Cosmetics</div>
        </div>
        <h2>Create Account 🎉</h2>
        <p>Join thousands of happy shoppers!</p>

        <div class="error-msg" id="error-msg"></div>

        <div class="form-group">
          <label class="form-label" for="fullname">Full Name</label>
          <input class="form-input" type="text" id="fullname" placeholder="Mansi Sharma" autocomplete="name" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="phone">Phone Number</label>
            <input class="form-input" type="tel" id="phone" placeholder="+91 98765 43210" autocomplete="tel" maxlength="13" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input class="form-input" type="password" id="password" placeholder="Min 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)" />
            <button class="toggle-pass" type="button" onclick="togglePassword('password', this)" aria-label="Toggle password">👁️</button>
          </div>
          <div class="strength-bar"><div class="fill" id="strength-fill"></div></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="password-wrapper">
            <input class="form-input" type="password" id="confirm-password" placeholder="Re-enter password" autocomplete="new-password" />
            <button class="toggle-pass" type="button" onclick="togglePassword('confirm-password', this)" aria-label="Toggle confirm password">👁️</button>
          </div>
        </div>

        <label class="terms-check">
          <input type="checkbox" id="terms-check" />
          I agree to the <a href="#">Terms &amp; Conditions</a> and <a href="#">Privacy Policy</a> of Mansi Jewellery &amp; Cosmetics.
        </label>

        <button class="btn-full" id="signup-btn" onclick="handleSignup()">Create Account 🚀</button>

        <div class="form-divider"><span>OR</span></div>

        <div class="auth-switch">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </div>
    </div>

    <!-- AD3-BOTTOM -->
    <div style="width:100%;background:#000;display:flex;justify-content:center;align-items:center;padding:10px 0;margin-top:20px;overflow:hidden;">
      <a href="https://hilltopads.com/?ref=392928" target="_blank" rel="noopener">
        <img src="//static.hilltopads.com/other/banners/pub/make_big_money/728x90.gif?v=1783682851" alt="Advertisement" style="max-width:100%;height:auto;display:block;"/>
      </a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    loadTheme();

    if (DB.getSession()) {
      window.location.href = 'index.html';
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.textContent = input.type === 'password' ? '👁️' : '🙈';
    }

    function checkStrength(value) {
      const fill = document.getElementById('strength-fill');
      let score = 0;
      if (value.length >= 6) score++;
      if (value.length >= 10) score++;
      if (/[A-Z]/.test(value)) score++;
      if (/[0-9]/.test(value)) score++;
      if (/[^A-Za-z0-9]/.test(value)) score++;
      const colors = ['', '#EF4444', '#F59E0B', '#10B981', '#10B981', '#10B981'];
      fill.style.width = (score / 5 * 100) + '%';
      fill.style.background = colors[score] || 'transparent';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    async function handleSignup() {
      hideError();
      const name = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      const terms = document.getElementById('terms-check').checked;
      const btn = document.getElementById('signup-btn');

      if (!name) return showError('Please enter your full name.');
      if (name.split(' ').length < 1 || name.length < 2) return showError('Please enter a valid full name.');
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError('Please enter a valid email address.');
      if (!phone || phone.replace(/\D/g, '').length < 10) return showError('Please enter a valid 10-digit phone number.');
      if (password.length < 6) return showError('Password must be at least 6 characters long.');
      if (password !== confirm) return showError('Passwords do not match. Please re-enter.');
      if (!terms) return showError('Please accept the Terms & Conditions to continue.');

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        const result = await DB.registerUser({ name, email, phone, password });
        if (result.error) {
          showError(result.error);
          btn.textContent = 'Create Account 🚀';
          btn.disabled = false;
        } else {
          DB.setSession(result.user);
          Cart.showToast('Account created! Welcome to Mansi Store 🎉');
          setTimeout(() => { window.location.href = 'index.html'; }, 600);
        }
      } catch (e) {
        showError(e.message || 'Registration failed.');
        btn.textContent = 'Create Account 🚀';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
